<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate 6 & 7 Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            background-color: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        select:hover {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .result-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .calculation-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .calculation {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
            min-height: 28px;
            word-break: break-word;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
            margin: 20px 0;
        }

        .result-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result {
            font-size: 42px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            line-height: 1.2;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            line-height: 1.6;
        }

        .info-box strong {
            color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .operations-count {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>6 & 7 Calculator</h1>
        <p class="subtitle">Every possible operation between 6 and 7</p>

        <div class="form-group">
            <label for="operation">Choose Your Operation</label>
            <select id="operation">
                <option value="0">6 + 7 (Addition)</option>
                <option value="1">7 - 6 (Subtraction)</option>
                <option value="2">6 - 7 (Subtraction)</option>
                <option value="3">6 × 7 (Multiplication)</option>
                <option value="4">6 ÷ 7 (Division)</option>
                <option value="5">7 ÷ 6 (Division)</option>
                <option value="6">6⁷ (6 to the power of 7)</option>
                <option value="7">7⁶ (7 to the power of 6)</option>
                <option value="8">6^(1/7) (7th root of 6)</option>
                <option value="9">7^(1/6) (6th root of 7)</option>
                <option value="10">√6 (Square root of 6)</option>
                <option value="11">√7 (Square root of 7)</option>
                <option value="12">∛6 (Cube root of 6)</option>
                <option value="13">∛7 (Cube root of 7)</option>
                <option value="14">log₆(7) (Log base 6 of 7)</option>
                <option value="15">log₇(6) (Log base 7 of 6)</option>
                <option value="16">ln(6) (Natural log of 6)</option>
                <option value="17">ln(7) (Natural log of 7)</option>
                <option value="18">log₁₀(6) (Common log of 6)</option>
                <option value="19">log₁₀(7) (Common log of 7)</option>
                <option value="20">6 % 7 (Modulo)</option>
                <option value="21">7 % 6 (Modulo)</option>
                <option value="22">6! (Factorial of 6)</option>
                <option value="23">7! (Factorial of 7)</option>
                <option value="24">GCD(6, 7) (Greatest Common Divisor)</option>
                <option value="25">LCM(6, 7) (Least Common Multiple)</option>
                <option value="26">sin(6) (Sine of 6 radians)</option>
                <option value="27">sin(7) (Sine of 7 radians)</option>
                <option value="28">cos(6) (Cosine of 6 radians)</option>
                <option value="29">cos(7) (Cosine of 7 radians)</option>
                <option value="30">tan(6) (Tangent of 6 radians)</option>
                <option value="31">tan(7) (Tangent of 7 radians)</option>
                <option value="32">C(7,6) (Combinations 7 choose 6)</option>
                <option value="33">P(7,6) (Permutations 7 pick 6)</option>
                <option value="34">6.7 (Six point seven)</option>
                <option value="35">67 (Sixty-seven)</option>
                <option value="36">6 & 7 (Bitwise AND)</option>
                <option value="37">6 | 7 (Bitwise OR)</option>
                <option value="38">6 ^ 7 (Bitwise XOR)</option>
            </select>
        </div>

        <div class="result-box">
            <div class="calculation-label">Calculation</div>
            <div class="calculation" id="calculation">6 + 7</div>
            <div class="divider"></div>
            <div class="result-label">Result</div>
            <div class="result" id="result">13</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Operations</div>
                <div class="stat-value">39</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Current Index</div>
                <div class="stat-value"><span id="current-index">1</span>/39</div>
            </div>
        </div>

        <div class="info-box">
            <strong>Did you know?</strong> The fraction 6/7 = 0.857142857142... (with the sequence 857142 repeating infinitely!)
        </div>

        <button onclick="randomOperation()">🎲 Random Operation</button>

        <div class="operations-count">
            Showing all 39 possible operations between 6 and 7
        </div>
    </div>

    <script>
        const operations = [
            { name: '6 + 7', calc: () => 6 + 7 },
            { name: '7 - 6', calc: () => 7 - 6 },
            { name: '6 - 7', calc: () => 6 - 7 },
            { name: '6 × 7', calc: () => 6 * 7 },
            { name: '6 ÷ 7', calc: () => 6 / 7 },
            { name: '7 ÷ 6', calc: () => 7 / 6 },
            { name: '6⁷', calc: () => Math.pow(6, 7) },
            { name: '7⁶', calc: () => Math.pow(7, 6) },
            { name: '⁷√6', calc: () => Math.pow(6, 1/7) },
            { name: '⁶√7', calc: () => Math.pow(7, 1/6) },
            { name: '√6', calc: () => Math.sqrt(6) },
            { name: '√7', calc: () => Math.sqrt(7) },
            { name: '∛6', calc: () => Math.cbrt(6) },
            { name: '∛7', calc: () => Math.cbrt(7) },
            { name: 'log₆(7)', calc: () => Math.log(7) / Math.log(6) },
            { name: 'log₇(6)', calc: () => Math.log(6) / Math.log(7) },
            { name: 'ln(6)', calc: () => Math.log(6) },
            { name: 'ln(7)', calc: () => Math.log(7) },
            { name: 'log₁₀(6)', calc: () => Math.log10(6) },
            { name: 'log₁₀(7)', calc: () => Math.log10(7) },
            { name: '6 % 7', calc: () => 6 % 7 },
            { name: '7 % 6', calc: () => 7 % 6 },
            { name: '6!', calc: () => 720 },
            { name: '7!', calc: () => 5040 },
            { name: 'GCD(6,7)', calc: () => 1 },
            { name: 'LCM(6,7)', calc: () => 42 },
            { name: 'sin(6)', calc: () => Math.sin(6) },
            { name: 'sin(7)', calc: () => Math.sin(7) },
            { name: 'cos(6)', calc: () => Math.cos(6) },
            { name: 'cos(7)', calc: () => Math.cos(7) },
            { name: 'tan(6)', calc: () => Math.tan(6) },
            { name: 'tan(7)', calc: () => Math.tan(7) },
            { name: 'C(7,6)', calc: () => 7 },
            { name: 'P(7,6)', calc: () => 5040 },
            { name: '6.7', calc: () => 6.7 },
            { name: '67', calc: () => 67 },
            { name: '6 & 7', calc: () => 6 & 7 },
            { name: '6 | 7', calc: () => 6 | 7 },
            { name: '6 ^ 7', calc: () => 6 ^ 7 }
        ];

        function formatResult(num) {
            if (Number.isInteger(num)) return num.toString();
            if (Math.abs(num) > 1000000 || (Math.abs(num) < 0.0001 && num !== 0)) {
                return num.toExponential(6);
            }
            return parseFloat(num.toFixed(10)).toString();
        }

        function updateDisplay() {
            const index = parseInt(document.getElementById('operation').value);
            const operation = operations[index];
            const result = operation.calc();

            document.getElementById('calculation').textContent = operation.name;
            document.getElementById('result').textContent = formatResult(result);
            document.getElementById('current-index').textContent = index + 1;
        }

        function randomOperation() {
            const randomIndex = Math.floor(Math.random() * operations.length);
            document.getElementById('operation').value = randomIndex;
            updateDisplay();
        }

        document.getElementById('operation').addEventListener('change', updateDisplay);
        updateDisplay();
    </script>
</body>
</html>
